name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hono:
    name: Hono — test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - working-directory: examples/01-hono
        run: bun install --frozen-lockfile
      - working-directory: examples/01-hono
        run: bun test

  astro:
    name: Astro — test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - working-directory: examples/02-astro
        run: bun install --frozen-lockfile
      - working-directory: examples/02-astro
        run: bun test
      - working-directory: examples/02-astro
        run: bun run build

  sveltekit:
    name: SvelteKit — test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - working-directory: examples/03-sveltekit
        run: bun install --frozen-lockfile
      - working-directory: examples/03-sveltekit
        run: bun test
      - working-directory: examples/03-sveltekit
        run: bun run build

  svelte-vite:
    name: Svelte 5 SPA — test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - working-directory: examples/04-svelte-vite
        run: bun install --frozen-lockfile
      - working-directory: examples/04-svelte-vite
        run: bun test
      - working-directory: examples/04-svelte-vite
        run: bun run build
